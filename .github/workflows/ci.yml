name: CI

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - 'LICENSE'
      - '*.md'
      - 'assets/**'
      - '.vscode/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.0.0
        with:
          install-only: true
          version: "v2.11.4"

      - name: Install hadolint
        env:
          HADOLINT_VERSION: v2.12.0
          HADOLINT_SHA256: 56de6d5e5ec427e17b74fa48d51271c7fc0d61244bf5c90e828aab8362d55010
        run: |
          curl -fsSL -o hadolint "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          echo "${HADOLINT_SHA256}  hadolint" | sha256sum -c -
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  build:
    name: Build and test
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version-file: go.mod

      - run: go build -ldflags="-s -w" ./cmd/screwsbox

      - run: go test ./... -count=1
