<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Screw head (top-down view) -->
  <circle cx="32" cy="20" r="14" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <!-- Cross slot on screw head -->
  <line x1="24" y1="20" x2="40" y2="20" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="12" x2="32" y2="28" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Screw shaft -->
  <rect x="29" y="33" width="6" height="22" rx="1" fill="#9ca3af" stroke="#374151" stroke-width="1.5"/>
  <!-- Thread lines -->
  <line x1="28" y1="38" x2="36" y2="38" stroke="#6b7280" stroke-width="1.2"/>
  <line x1="28" y1="42" x2="36" y2="42" stroke="#6b7280" stroke-width="1.2"/>
  <line x1="28" y1="46" x2="36" y2="46" stroke="#6b7280" stroke-width="1.2"/>
  <line x1="28" y1="50" x2="36" y2="50" stroke="#6b7280" stroke-width="1.2"/>
  <!-- Screw tip -->
  <polygon points="29,55 35,55 32,60" fill="#9ca3af" stroke="#374151" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
