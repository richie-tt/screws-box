{{define "extra_head"}}
<link rel="stylesheet" href="/static/css/grid.css">
<script src="/static/js/grid.js" defer></script>
{{end}}

{{define "content"}}
{{if .Error}}
<article>
  <h2>Nie mozna zaladowac polki</h2>
  <p>Sprawdz logi serwera.</p>
</article>
{{else}}
<div class="search-bar">
  <input type="search" placeholder="Szukaj elementow..." aria-label="Szukaj elementow" disabled>
</div>

<div class="grid-wrapper">
  <div class="grid-container" style="--grid-cols: {{.Cols}}">
    <!-- Corner cell -->
    <div class="grid-header grid-corner"></div>
    <!-- Column headers -->
    {{range .ColNumbers}}
    <div class="grid-header col-header">{{.}}</div>
    {{end}}
    <!-- Grid rows -->
    {{range .Grid}}
    <div class="grid-header row-header">{{.Letter}}</div>
    {{range .Cells}}
    <button class="grid-cell {{.CSSClass}}{{if .IsEmpty}} cell-empty{{end}}"
            data-coord="{{.Coord}}"
            data-container-id="{{.ContainerID}}"
            data-count="{{.Count}}"
            type="button">
      <span class="cell-coord">{{.Coord}}</span>
      <span class="cell-count">{{if .IsEmpty}}&mdash;{{else}}{{.Count}} elem.{{end}}</span>
    </button>
    {{end}}
    {{end}}
  </div>
</div>

<dialog id="item-dialog">
  <article>
    <header>
      <button aria-label="Close" rel="prev" id="dialog-close"></button>
      <p><strong>Pojemnik <span id="dialog-coord"></span></strong></p>
    </header>
    <div id="dialog-body">
      <!-- Populated dynamically by grid.js -->
    </div>
    <footer id="dialog-footer">
    </footer>
  </article>
</dialog>
{{end}}
{{end}}
