{{define "extra_head"}}
<link rel="stylesheet" href="/static/css/grid.css">
{{end}}

{{define "content"}}
{{if .Error}}
<article>
  <h2>Nie mozna zaladowac polki</h2>
  <p>Sprawdz logi serwera.</p>
</article>
{{else}}
<div class="search-bar">
  <input type="search" placeholder="Szukaj elementow..." aria-label="Szukaj elementow" disabled>
</div>

<div class="grid-wrapper">
  <div class="grid-container" style="--grid-cols: {{.Cols}}">
    <!-- Corner cell -->
    <div class="grid-header grid-corner"></div>
    <!-- Column headers -->
    {{range .ColNumbers}}
    <div class="grid-header col-header">{{.}}</div>
    {{end}}
    <!-- Grid rows -->
    {{range .Grid}}
    <div class="grid-header row-header">{{.Letter}}</div>
    {{range .Cells}}
    <div class="grid-cell {{.CSSClass}}{{if .IsEmpty}} cell-empty{{end}}" data-coord="{{.Coord}}">
      <span class="cell-coord">{{.Coord}}</span>
      <span class="cell-count">{{if .IsEmpty}}&mdash;{{else}}{{.Count}} elem.{{end}}</span>
    </div>
    {{end}}
    {{end}}
  </div>
</div>
{{end}}
{{end}}
