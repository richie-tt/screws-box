{{define "extra_head"}}
<link rel="stylesheet" href="/static/css/grid.css">
<script src="/static/js/grid.js" defer></script>
{{end}}

{{define "content"}}
{{if .Error}}
<article>
  <h2>Cannot load shelf</h2>
  <p>Check server logs.</p>
</article>
{{else}}
<div class="shelf-layout">
  <aside class="search-sidebar">
    <div class="search-sidebar-input">
      <input type="search" id="search-input" placeholder="Search items or tags..." aria-label="Search items"
             role="combobox" aria-expanded="false" aria-autocomplete="list"
             aria-controls="search-results-listbox" aria-activedescendant="" autocomplete="off">
      <span class="search-spinner" hidden></span>
      <button type="button" class="search-clear-btn" aria-label="Clear search" hidden>&times;</button>
    </div>
    <div class="search-sidebar-hint" id="search-hint">
      <kbd>/</kbd> to focus
    </div>
    <div class="search-results-panel" id="search-dropdown" hidden>
      <div class="search-dropdown-header"></div>
      <ul id="search-results-listbox" role="listbox" aria-label="Search results" class="search-results-list"></ul>
      <div class="search-dropdown-empty" hidden></div>
      <div class="search-dropdown-error" hidden></div>
    </div>
  </aside>
  <div class="grid-wrapper">
    <div class="grid-container" style="--grid-cols: {{.Cols}}">
      <!-- Corner cell -->
      <div class="grid-header grid-corner">
        <button class="ghost settings-trigger" aria-label="Grid settings" title="Grid settings"
                data-shelf-name="{{.ShelfName}}" data-shelf-rows="{{.Rows}}" data-shelf-cols="{{.Cols}}">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.9 2.9l1.06 1.06M12.04 12.04l1.06 1.06M2.9 13.1l1.06-1.06M12.04 3.96l1.06-1.06"/>
          </svg>
        </button>
      </div>
      <!-- Column headers -->
      {{range .ColNumbers}}
      <div class="grid-header col-header">{{.}}</div>
      {{end}}
      <!-- Grid rows -->
      {{range .Grid}}
      <div class="grid-header row-header">{{.Letter}}</div>
      {{range .Cells}}
      <button class="grid-cell {{.CSSClass}}{{if .IsEmpty}} cell-empty{{end}}"
              data-coord="{{.Coord}}"
              data-container-id="{{.ContainerID}}"
              data-count="{{.Count}}"
              type="button">
        <span class="cell-coord">{{.Coord}}</span>
        <span class="cell-count">{{if .IsEmpty}}&mdash;{{else}}{{if eq .Count 1}}1 item{{else}}{{.Count}} items{{end}}{{end}}</span>
      </button>
      {{end}}
      {{end}}
    </div>
  </div>
</div>
{{end}}
{{end}}
